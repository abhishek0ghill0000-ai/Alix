buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "26.3.11579264"
        kotlinVersion = "1.9.24"  // Stable for AGP 8.7.2 + RN 0.83.1
        reactNativeVersion = "0.83.1"
    }
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.7.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
        maven {
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            url("$rootDir/../node_modules/@react-native-community/cli-platform-android/native/androidx")
        }
        maven {
            url("$rootDir/../node_modules/@react-native-community/cli-platform-android/native/androidx/maven")
        }
    }
}

apply plugin: "com.facebook.react.rootproject"
