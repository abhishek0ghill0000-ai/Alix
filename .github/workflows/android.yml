name: Android CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

    - name: Install dependencies
      run: cd client && npm ci --legacy-peer-deps

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          client/android/app/build/outputs/apk  # APK cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('client/android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('client/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Setup Gradle wrapper
      run: |
        cd client/android
        chmod +x ./gradlew
        ./gradlew --version  # Verify

    - name: Build APK
      run: cd client/android && ./gradlew assembleRelease --no-daemon -PdeprecationWarning=false
      env:
        GRADLE_OPTS: '-Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1g -Dkotlin.incremental=false"'

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: synce-android-apk-v${{ github.sha }}
        path: client/android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
