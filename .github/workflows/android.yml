name: Build Alix Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
        
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          client/android/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Install dependencies (Root/Monorepo)
      run: |
        npm ci --prefer-offline --no-audit --no-fund
        
    - name: Install client dependencies
      run: cd client && npm ci --prefer-offline --no-audit --no-fund
      
    - name: Clean Gradle (Safe)
      run: |
        cd client/android
        chmod +x gradlew
        ./gradlew clean --no-daemon || true  # Ignore missing files
        cd ../..
      continue-on-error: true
      
    - name: Build APK
      run: |
        cd client
        npx react-native bundle Android --dev false --platform android --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
        cd android
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: client/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
