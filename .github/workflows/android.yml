name: Build Alix Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: client/android/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('client/android/**/build.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'client/package-lock.json'

    - name: Install dependencies
      working-directory: client
      run: npm install  # Changed from ci!

    - name: Clean
      working-directory: client/android
      run: ./gradlew clean

    - name: Create assets dir
      run: mkdir -p client/android/app/src/main/assets

    - name: Bundle JS
      working-directory: client
      run: npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

    - name: Build APK
      working-directory: client/android
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: client/android/app/build/outputs/apk/debug/app-debug.apk
