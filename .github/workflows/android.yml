name: Android CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

    - name: Install dependencies
      run: cd client && npm ci --legacy-peer-deps

    - name: AGGRESSIVE Gradle Cache Clear
      run: |
        rm -rf $HOME/.gradle/caches/
        rm -rf $HOME/.gradle/wrapper/
        rm -rf client/android/.gradle/
        rm -rf client/android/app/build/
        rm -rf client/android/build/

    - name: Setup Gradle wrapper
      run: |
        cd client/android
        chmod +x ./gradlew
        ./gradlew wrapper --gradle-version 8.4-all
        ./gradlew --version

    - name: Build APK (Kotlin DISABLED)
      run: |
        cd client/android
        ./gradlew clean
        ./gradlew assembleRelease \
          --no-daemon \
          -PnewArchEnabled=false \
          -PenableHermes=false \
          --stacktrace \
          -Dkotlin.incremental=false \
          -Pkotlin.compiler.execution.strategy=in-process \
          -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"
      env:
        GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dkotlin.incremental=false'

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: synce-android-apk-v${{ github.sha }}
        path: client/android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
