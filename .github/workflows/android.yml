name: 🚀 Build APK
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        
    - name: Install & Build Client
      run: |
        cd client
        npm ci
        npm install react-native@0.72.0
        npx react-native@0.72.0 init RN-Template --skip-install --directory ./RN-Template
        cp -rf RN-Template/* .
        rm -rf RN-Template
        cd android && chmod +x gradlew && ./gradlew assembleRelease
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Alix-APK
        path: client/android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
