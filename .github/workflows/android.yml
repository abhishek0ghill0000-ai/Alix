name: Build Alix Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'client/package-lock.json'

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          client/android/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('client/android/**.gradle*', 'client/android/gradle.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # ✅ Direct client folder - no root install needed
    - name: Install client dependencies
      working-directory: ./client
      run: |
        npm ci --no-audit --no-fund || npm install --no-audit --no-fund

    - name: Clean Gradle
      working-directory: ./client/android
      run: |
        chmod +x gradlew
        ./gradlew clean --no-daemon
      continue-on-error: true

    - name: Create assets directory
      working-directory: ./client/android/app/src/main
      run: |
        mkdir -p assets

    - name: Build React Native bundle
      working-directory: ./client
      run: |
        npx react-native bundle \
          --platform android \
          --dev false \
          --entry-file index.js \
          --bundle-output android/app/src/main/assets/index.android.bundle \
          --assets-dest android/app/src/main/res

    - name: Build APK
      working-directory: ./client/android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
