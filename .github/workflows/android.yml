name: Synce Android CI/CD
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Node 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install React Native CLI
      run: npm install -g @react-native-community/cli
      
    - name: Cache node_modules
      uses: actions/cache@v4
      with:
        path: '**/node_modules'
        key: ${{ runner.os }}-modules-${{ hashFiles('**/package-lock.json') }}
        
    - name: Install client dependencies
      run: |
        cd client
        npm ci --legacy-peer-deps
        
    - name: Setup Android gradlew
      run: |
        cd client/android
        curl -O https://raw.githubusercontent.com/facebook/react-native/main/packages/react-native/template/android/gradlew
        curl -O https://raw.githubusercontent.com/facebook/react-native/main/packages/react-native/template/android/gradlew.bat
        chmod +x gradlew
        
    - name: Generate Metro cache
      run: |
        cd client
        npx react-native start --reset-cache &
        sleep 30
        
    - name: Clean & Build APK
      run: |
        cd client
        npx react-native clean
        cd android
        ./gradlew assembleDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: synce-app-debug.apk
        path: client/android/app/build/outputs/apk/debug/app-debug.apk
