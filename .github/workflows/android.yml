name: Synce Android APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Node 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install React Native CLI
      run: npm install -g @react-native-community/cli
      
    - name: Install client dependencies
      run: |
        cd client
        npm ci --legacy-peer-deps
        
    - name: Setup Android gradlew
      run: |
        cd client/android
        curl -O https://raw.githubusercontent.com/facebook/react-native/main/packages/react-native/template/android/gradlew
        curl -O https://raw.githubusercontent.com/facebook/react-native/main/packages/react-native/template/android/gradlew.bat
        chmod +x gradlew
        
    - name: Clean project
      run: |
        cd client
        npx react-native clean
        
    - name: Build APK
      run: |
        cd client/android
        ./gradlew assembleDebug
        
    - name: Upload Synce APK
      uses: actions/upload-artifact@v4
      with:
        name: synce-app-debug.apk
        path: client/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
