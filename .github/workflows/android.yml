name: 🚀 Build React Native APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: ✅ Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'  # Cache on - client/package-lock.json auto detect

    - name: 🔧 Install client dependencies
      run: cd client && npm install  # npm install > ci (generates lockfile)

    - name: 📱 Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: 🔄 Generate Metro bundle
      run: cd client && npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

    - name: 🧹 Clean & Build APK
      run: cd client/android && ./gradlew clean assembleRelease

    - name: 📥 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release.apk
        path: client/android/app/build/outputs/apk/release/app-release.apk
