name: Alix APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
    
    - name: Install deps (no ci)
      run: npm install --legacy-peer-deps
      
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Gradle
      uses: actions/cache@v4
      key: gradle-${{ hashFiles('gradle.properties', '**/build.gradle') }}
      path: |
        ~/.gradle/caches
        ~/.gradle/wrapper
    
    - name: Check folders
      run: ls -la android/ || echo "No android, skipping build"
    
    - name: Build APK
      run: |
        if [ -d "android" ]; then
          cd android && chmod +x ./gradlew && ./gradlew assembleRelease
        else
          echo "No android folder - client-only repo"
        fi
      continue-on-error: true
    
    - name: Upload everything
      uses: actions/upload-artifact@v4
      with:
        name: Alix-Complete
        path: .
