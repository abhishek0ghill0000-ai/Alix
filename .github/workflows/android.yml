name: 🚀 React Native APK Build
on: 
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: ✅ Checkout code
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - name: 🔧 Setup Java 17 (Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: 📱 Install Android SDK
      uses: android-actions/setup-android@v3
      
    - name: 🧹 Clean client dependencies
      run: |
        cd client
        rm -f package-lock.json yarn.lock
        rm -rf node_modules
        
    - name: 📥 Install client dependencies
      run: |
        cd client
        npm install
        
    - name: 🏗️ Generate Android folder
      run: |
        cd client
        npx react-native@0.74.5 upgrade --legacy true
        
    - name: 🔑 Accept Android licenses
      run: |
        cd client
        echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --licenses >/dev/null
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null
        
    - name: ⚙️ Fix gradle permissions
      run: |
        cd client/android
        chmod +x gradlew
        chmod +x gradlew.bat
        chmod -R 755 .
        
    - name: 🏗️ Build APK (Debug)
      run: |
        cd client/android
        ./gradlew assembleDebug
        
    - name: 📤 Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Alix-Debug-APK
        path: client/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    - name: 🏗️ Build APK (Release)
      run: |
        cd client/android
        ./gradlew assembleRelease
        
    - name: 📤 Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: Alix-Release-APK
        path: client/android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
