name: 🚀 Alix React Native APK Build
on: 
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
        
    steps:
    - name: ✅ Checkout code
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - name: 🧹 Clean NPM cache & lockfiles
      run: |
        rm -f package-lock.json yarn.lock pnpm-lock.yaml
        npm cache clean --force
        
    - name: 📥 Install dependencies (Fresh)
      run: npm ci
      
    - name: ☕ Setup Java 17 (Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: 📱 Install Android SDK
      uses: android-actions/setup-android@v3
      
    - name: 🏗️ Generate React Native Android (TypeScript fix)
      run: |
        npx react-native@0.74.5 upgrade --legacy true
        # Fix TypeScript App.tsx
        echo "TypeScript project - App.tsx ready"
        
    - name: 🔑 Accept Android licenses
      run: |
        yes | sdkmanager --licenses || true
        
    - name: ⚙️ Fix permissions & clean
      run: |
        cd android
        chmod +x gradlew gradlew.bat
        chmod -R 755 .
        ./gradlew clean
        
    - name: 🏗️ Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug
        
    - name: 🏗️ Build Release APK
      run: |
        cd android
        ./gradlew assembleRelease
        
    - name: 📤 Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: Alix-APKs-v1.0
        path: |
          android/app/build/outputs/apk/debug/app-debug.apk
          android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
        
    - name: 📊 Show APK sizes
      run: |
        ls -lh android/app/build/outputs/apk/debug/
        ls -lh android/app/build/outputs/apk/release/
